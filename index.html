<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GridMind · 200-Post Content Studio · All Posters</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --b:#1A73E8;--g:#00E5A0;--p:#B026FF;--a:#FF6B35;--y:#FFE600;
  --dark:#04080F;--darker:#020509;--card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);--text:#E8EAF0;--muted:rgba(255,255,255,0.38);
}
body{background:var(--darker);color:var(--text);font-family:'Space Grotesk',sans-serif;
      min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ─────────────────────────────────────────────────── */
.hdr{background:rgba(4,8,15,0.98);border-bottom:1px solid rgba(26,115,232,0.3);
      padding:0 20px;height:58px;display:flex;align-items:center;gap:14px;
      position:sticky;top:0;z-index:300;backdrop-filter:blur(20px);}
.hdr-logo{height:32px;width:auto;}
.hdr-div{width:1px;height:28px;background:rgba(255,255,255,0.1);}
.hdr-title{display:flex;flex-direction:column;}
.hdr-title h1{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;
                color:#fff;letter-spacing:0.05em;text-transform:uppercase;}
.hdr-title p{font-size:10px;color:var(--muted);margin-top:1px;}
.hdr-pills{margin-left:auto;display:flex;gap:8px;}
.hdr-pill{background:rgba(26,115,232,0.12);border:1px solid rgba(26,115,232,0.25);
            border-radius:20px;padding:4px 12px;display:flex;flex-direction:column;
            align-items:center;}
.hdr-pill .pv{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
                color:var(--b);line-height:1;}
.hdr-pill .pl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}

/* ── LAYOUT ─────────────────────────────────────────────────── */
.layout{display:flex;flex:1;height:calc(100vh - 58px);overflow:hidden;}

/* ── SIDEBAR ────────────────────────────────────────────────── */
.sb{width:200px;background:rgba(4,8,15,0.95);border-right:1px solid var(--border);
     overflow-y:auto;flex-shrink:0;padding:12px 8px;}
.sb::-webkit-scrollbar{width:2px;}
.sb::-webkit-scrollbar-thumb{background:rgba(26,115,232,0.3);border-radius:1px;}
.wk-lbl{font-size:8px;font-weight:700;color:rgba(26,115,232,0.5);
          text-transform:uppercase;letter-spacing:.15em;padding:8px 6px 4px;
          border-top:1px solid rgba(26,115,232,0.1);margin-top:4px;}
.wk-lbl:first-child{border-top:none;margin-top:0;}
.db{width:100%;display:flex;align-items:center;gap:6px;padding:5px 7px;
      border-radius:6px;border:none;background:transparent;cursor:pointer;
      color:var(--muted);font-size:11px;text-align:left;transition:.12s;
      font-family:'Space Grotesk',sans-serif;}
.db:hover{background:rgba(26,115,232,0.1);color:#fff;}
.db.on{background:linear-gradient(135deg,rgba(26,115,232,0.3),rgba(0,229,160,0.1));
         color:#fff;border:1px solid rgba(26,115,232,0.3);}
.db .dn{font-weight:700;font-size:11px;min-width:20px;color:var(--b);}
.db.on .dn{color:var(--g);}
.db .dt{flex:1;font-size:9px;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.db .dc{font-size:8px;font-weight:700;background:rgba(26,115,232,0.15);
          border-radius:8px;padding:1px 5px;color:var(--b);}
.db.on .dc{background:rgba(0,229,160,0.15);color:var(--g);}

/* ── CENTER ─────────────────────────────────────────────────── */
.ctr{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* Filter bar */
.fb{display:flex;gap:4px;padding:8px 14px;background:rgba(4,8,15,0.97);
      border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;
      position:sticky;top:0;z-index:10;}
.fb-lbl{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;
          letter-spacing:.1em;margin-right:2px;}
.fb-btn{font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;
          border:1px solid var(--border);background:transparent;cursor:pointer;
          color:var(--muted);transition:.1s;font-family:'Space Grotesk',sans-serif;}
.fb-btn:hover{border-color:var(--b);color:var(--b);}
.fb-btn.on{background:var(--b);color:#fff;border-color:var(--b);}
.fb-day{margin-left:auto;font-size:10px;font-weight:600;color:#fff;
          font-family:'Syne',sans-serif;}

/* Post list */
.pl{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.pl::-webkit-scrollbar{width:3px;}
.pl::-webkit-scrollbar-thumb{background:rgba(26,115,232,0.2);border-radius:1px;}

/* Post card */
.pc{background:rgba(8,14,26,0.8);border:1px solid var(--border);border-radius:10px;
      display:flex;overflow:hidden;cursor:pointer;transition:.15s;position:relative;}
.pc:hover{border-color:rgba(26,115,232,0.4);box-shadow:0 4px 24px rgba(26,115,232,0.08);}
.pc.sel{border-color:rgba(0,229,160,0.5);box-shadow:0 0 0 1px rgba(0,229,160,0.2);}
.pc-stripe{width:3px;flex-shrink:0;}
.pc-body{flex:1;padding:10px 12px;min-width:0;}
.pc-thumb{width:186px;flex-shrink:0;border-left:1px solid var(--border);
            background:#000;position:relative;overflow:hidden;}
.pc-thumb canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.pc-thumb-loader{position:absolute;inset:0;display:flex;align-items:center;
                   justify-content:center;font-size:8px;color:rgba(255,255,255,0.2);
                   font-family:'JetBrains Mono',monospace;}

.pct{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.tb{font-size:8px;font-weight:800;padding:2px 8px;border-radius:12px;
      text-transform:uppercase;letter-spacing:.1em;}
.ptm{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.pn{font-size:8px;color:rgba(255,255,255,0.15);margin-left:auto;
      font-family:'JetBrains Mono',monospace;}
.ph{font-size:12px;font-weight:700;color:#fff;margin-bottom:4px;line-height:1.35;
      font-family:'Syne',sans-serif;}
.pb{font-size:10.5px;color:rgba(255,255,255,0.48);line-height:1.55;
      max-height:48px;overflow:hidden;white-space:pre-line;}
.pfoot{display:flex;align-items:center;gap:5px;margin-top:7px;padding-top:7px;
         border-top:1px solid rgba(255,255,255,0.05);}
.vtag{font-size:8px;background:rgba(255,255,255,0.05);color:var(--muted);
        padding:2px 6px;border-radius:8px;border:1px solid var(--border);}
.ntag{font-size:8px;color:rgba(26,115,232,0.6);max-width:140px;overflow:hidden;
        text-overflow:ellipsis;white-space:nowrap;}
.cbtn{font-size:8px;font-weight:700;background:rgba(26,115,232,0.15);color:var(--b);
        border:1px solid rgba(26,115,232,0.25);border-radius:5px;padding:3px 8px;
        cursor:pointer;margin-left:auto;font-family:'Space Grotesk',sans-serif;}
.cbtn:hover{background:var(--b);color:#fff;}
.cbtn.ok{background:rgba(0,229,160,0.15);color:var(--g);border-color:rgba(0,229,160,0.25);}
.dlbtn{font-size:8px;font-weight:700;background:rgba(0,229,160,0.12);color:var(--g);
         border:1px solid rgba(0,229,160,0.2);border-radius:5px;padding:3px 8px;
         cursor:pointer;font-family:'Space Grotesk',sans-serif;}
.dlbtn:hover{background:var(--g);color:#000;}
</style>
</head>

const W=1600, H=900;

function hex2rgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return [r,g,b];
}
function rgba(h,a){const [r,g,b]=hex2rgb(h);return `rgba(${r},${g},${b},${a})`;}
function lerp(a,b,t){return a+(b-a)*t;}

function drawPoster(canvas, post, idx){
  canvas.width=W; canvas.height=H;
  const cx = canvas.getContext('2d');
  const tc  = TC[post.type] || '#1A73E8';
  const sec  = (TC[post.type+'_2'] || '#00E5A0');
  const fullTxt = [post.hook, post.body, post.cta].filter(Boolean).join('\n\n');
  const meta = TM[post.type] || {label:post.type, bg:tc, fg:'#fff'};

  // ── 1. DEEP SPACE BACKGROUND ─────────────────────────────────
  const bg = cx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0, '#020408');
  bg.addColorStop(0.4, '#03080F');
  bg.addColorStop(1, '#050A14');
  cx.fillStyle = bg; cx.fillRect(0,0,W,H);

  // ── 2. RADIAL ATMOSPHERE GLOW ────────────────────────────────
  // Primary glow — top-left
  const g1 = cx.createRadialGradient(W*0.12, H*0.15, 0, W*0.12, H*0.15, W*0.55);
  g1.addColorStop(0, rgba(tc, 0.18));
  g1.addColorStop(0.4, rgba(tc, 0.06));
  g1.addColorStop(1, 'transparent');
  cx.fillStyle=g1; cx.fillRect(0,0,W,H);

  // Secondary glow — bottom-right  
  const g2 = cx.createRadialGradient(W*0.88, H*0.85, 0, W*0.88, H*0.85, W*0.45);
  g2.addColorStop(0, rgba('#00E5A0', 0.12));
  g2.addColorStop(0.5, rgba('#00E5A0', 0.04));
  g2.addColorStop(1, 'transparent');
  cx.fillStyle=g2; cx.fillRect(0,0,W,H);

  // ── 3. 3D PERSPECTIVE GRID ────────────────────────────────────
  draw3DGrid(cx, tc, W, H);

  // ── 4. FLOATING HEXAGONS (3D-ish) ────────────────────────────
  drawHexField(cx, tc, '#00E5A0', idx, W, H);

  // ── 5. ENERGY PARTICLE FIELD ─────────────────────────────────
  drawParticles(cx, tc, idx, W, H);

  // ── 6. CIRCUIT LINES ─────────────────────────────────────────
  drawCircuitLines(cx, tc, idx, W, H);

  // ── LAYOUT CONSTANTS — typographic grid ──────────────────────
  // Card: x=44, inner padding=36px → content starts at x=80
  // Card right edge: 44 + W*0.56 = ~940px → content max-width = 940-80-36 = 824px
  const CX = 80;           // consistent left edge for ALL content
  const CW = W*0.56-80-24; // content column width ≈ 792px
  const CARD_X=44, CARD_Y=56, CARD_W=W*0.56, CARD_H=H-112;

  // ── 7. MAIN GLASS CARD (left) ────────────────────────────────
  drawGlassCard(cx, tc, CARD_X, CARD_Y, CARD_W, CARD_H, rgba);

  // ── 8. ROW 1: LOGO  (y=88, h=40) ────────────────────────────
  const LOGO_Y=88, LOGO_H=40;
  if(logoImg.complete && logoImg.naturalWidth>0){
    const lw=Math.round(logoImg.naturalWidth/logoImg.naturalHeight*LOGO_H);
    cx.drawImage(logoImg, CX, LOGO_Y, lw, LOGO_H);
  }

  // ── 9. ROW 2: TYPE BADGE + DAY CHIP  (y=152, h=28) ──────────
  const BADGE_Y=152, BADGE_H=28;

  // Type badge
  cx.font='bold 10px "Space Grotesk",sans-serif';
  const badgeTxt=meta.label;
  const badgeW=cx.measureText(badgeTxt).width+24;
  drawGlassPill(cx, CX, BADGE_Y, badgeW, BADGE_H, tc, rgba);
  cx.font='bold 10px "Space Grotesk",sans-serif';
  cx.fillStyle='#fff'; cx.textAlign='center';
  cx.fillText(badgeTxt, CX+badgeW/2, BADGE_Y+18);
  cx.textAlign='left';

  // Day chip — right of badge, vertically centred to same baseline
  const dayStr=`Day ${post.day}  ·  ${post.time}  ·  #${idx+1}/200`;
  cx.font='9px "JetBrains Mono",monospace';
  const dayChipW=cx.measureText(dayStr).width+22;
  cx.fillStyle=rgba('#ffffff',0.06);
  roundRect(cx, CX+badgeW+10, BADGE_Y, dayChipW, BADGE_H, BADGE_H/2); cx.fill();
  cx.strokeStyle=rgba('#ffffff',0.1); cx.lineWidth=0.8;
  roundRect(cx, CX+badgeW+10, BADGE_Y, dayChipW, BADGE_H, BADGE_H/2); cx.stroke();
  cx.font='9px "JetBrains Mono",monospace';
  cx.fillStyle=rgba('#ffffff',0.38);
  cx.fillText(dayStr, CX+badgeW+21, BADGE_Y+18);

  // ── 10. ROW 3: HOOK HEADLINE  (y=204 → dynamic) ──────────────
  // Dynamic font size: shorter hooks get bigger font
  const hookText=post.hook||'';
  const hookLen=hookText.length;
  const hookSize = hookLen<30?60 : hookLen<50?50 : hookLen<70?42 : 36;
  const hookLineH = hookSize*1.22;
  const HOOK_Y=204, HOOK_MAX_LINES=3;

  cx.font=`bold ${hookSize}px "Syne",sans-serif`;
  cx.fillStyle='#FFFFFF';
  cx.shadowColor=rgba(tc,0.55); cx.shadowBlur=28;

  // Measure and wrap hook text, track actual rendered height
  const hookEndY=wrapReturnY(cx, hookText, CX, HOOK_Y+hookSize*0.85,
    CW, hookLineH, '#FFFFFF', `bold ${hookSize}px "Syne",sans-serif`, HOOK_MAX_LINES);
  cx.shadowBlur=0;

  // Thin accent rule below hook
  const RULE_Y=hookEndY+16;
  const ruleGrad=cx.createLinearGradient(CX,0,CX+CW*0.5,0);
  ruleGrad.addColorStop(0,rgba(tc,0.7)); ruleGrad.addColorStop(1,'transparent');
  cx.strokeStyle=ruleGrad; cx.lineWidth=1.5;
  cx.shadowColor=rgba(tc,0.6); cx.shadowBlur=6;
  cx.beginPath(); cx.moveTo(CX,RULE_Y); cx.lineTo(CX+CW*0.55,RULE_Y); cx.stroke();
  cx.shadowBlur=0;

  // ── 11. ROW 4: BODY TEXT  (starts below rule, adaptive) ──────
  const blines=(post.body||'').split('\n').filter(Boolean);
  const BODY_START=RULE_Y+22;
  const BODY_LINE_H=28;        // 18px font × 1.55 leading ≈ 28px
  const BODY_MAX_H=H-200;      // never go below this
  let by=BODY_START;

  blines.forEach((line,i)=>{
    if(by>BODY_MAX_H) return;
    const isFirstLine=(i===0);
    // First body line slightly larger and brighter — acts as subtitle
    const fSz=isFirstLine?18:16;
    const fAl=isFirstLine?0.72:0.46;
    cx.font=(isFirstLine?'500 ':'400 ')+fSz+'px "Space Grotesk",sans-serif';
    cx.fillStyle=rgba('#ffffff',fAl);
    // Truncate to fit column
    const maxChars=Math.floor(CW/(fSz*0.56));
    const clean=line.slice(0,maxChars)+(line.length>maxChars?'…':'');
    cx.fillText(clean, CX, by+fSz);
    by += fSz*1.6;           // proportional leading per line
  });

  // ── 12. BOTTOM ANCHOR: CTA + HASHTAGS ─────────────────────────
  // Pin these to bottom of card with fixed offsets from bottom
  // so they never overlap body text AND are always visible
  const BOTTOM=CARD_Y+CARD_H;          // bottom edge of glass card
  const CTA_Y=BOTTOM-112;               // URL box 112px above card bottom
  const HASH_Y=BOTTOM-60;              // hashtags 60px above card bottom

  // URL pill
  const ctaLines=(post.cta||'').split('\n');
  const urlLine=ctaLines.find(l=>l.includes('http'))||'';
  if(urlLine){
    const urlShort=urlLine.slice(0,54)+(urlLine.length>54?'…':'');
    cx.font='bold 12px "JetBrains Mono",monospace';
    const urlPillW=Math.min(CW, cx.measureText(urlShort).width+32);
    drawGlassPill(cx, CX, CTA_Y, urlPillW, 36, tc, rgba);
    // URL icon
    cx.font='12px sans-serif'; cx.fillStyle=rgba(tc,0.8);
    cx.fillText('🔗', CX+10, CTA_Y+23);
    cx.font='bold 12px "JetBrains Mono",monospace';
    cx.fillStyle='rgba(255,255,255,0.88)';
    cx.fillText(urlShort, CX+28, CTA_Y+23);
  }

  // Hashtags — compact row with individual coloured chips
  const hashLine=(post.cta||'').split('\n').find(l=>l.includes('#'))||'';
  if(hashLine){
    const tags=hashLine.split(' ').filter(t=>t.startsWith('#')).slice(0,8);
    let hx2=CX;
    tags.forEach((tag,i)=>{
      cx.font='bold 10px "Space Grotesk",sans-serif';
      const tw=cx.measureText(tag).width+14;
      if(hx2+tw>CX+CW) return;
      // Alternating tint colours
      const hCol=i%3===0?tc : i%3===1?'#00E5A0':'rgba(255,255,255,0.15)';
      cx.fillStyle=rgba(hCol.startsWith('#')?hCol:'#ffffff', 0.1);
      roundRect(cx,hx2,HASH_Y,tw,22,11); cx.fill();
      cx.fillStyle=rgba(hCol.startsWith('#')?hCol:'#ffffff',
        hCol.startsWith('rgba')?0.5:0.6);
      cx.fillText(tag, hx2+7, HASH_Y+15);
      hx2+=tw+6;
    });
  }

  // ── 13. RIGHT PANEL — type-specific visual ────────────────────
  const rpx = W*0.59, rpy = 60, rpw = W-rpx-44, rph = H-120;
  drawTypePanel(cx, post, idx, rpx, rpy, rpw, rph, tc, rgba, W, H);

  // ── 14. BOTTOM BAR ────────────────────────────────────────────
  const bbg = cx.createLinearGradient(0, H-52, W, H-52);
  bbg.addColorStop(0, rgba(tc,0.2));
  bbg.addColorStop(1, 'rgba(0,0,0,0)');
  cx.fillStyle=bbg; cx.fillRect(0,H-52,W,52);

  cx.font='bold 12px "Space Grotesk",sans-serif';
  cx.fillStyle=rgba(tc,0.8);
  cx.fillText('GridMind Protocol  ·  AI-Powered Decentralized Energy Intelligence Network', 44, H-18);
  cx.font='11px "JetBrains Mono",monospace';
  cx.fillStyle=rgba('#ffffff',0.3);
  cx.textAlign='right';
  cx.fillText('gridmind-xi.vercel.app  ·  @GridMindHQ  ·  #GridMind', W-44, H-18);
  cx.textAlign='left';

  // ── 15. TOP NEON LINE ─────────────────────────────────────────
  const topLine = cx.createLinearGradient(0,0,W,0);
  topLine.addColorStop(0,'transparent');
  topLine.addColorStop(0.1, tc);
  topLine.addColorStop(0.5, '#00E5A0');
  topLine.addColorStop(0.9, tc);
  topLine.addColorStop(1,'transparent');
  cx.strokeStyle=topLine; cx.lineWidth=2.5;
  cx.shadowColor=tc; cx.shadowBlur=12;
  cx.beginPath(); cx.moveTo(0,1.5); cx.lineTo(W,1.5); cx.stroke();
  cx.shadowBlur=0;

  // Left neon line
  const leftLine = cx.createLinearGradient(0,0,0,H);
  leftLine.addColorStop(0,'transparent');
  leftLine.addColorStop(0.2,tc);
  leftLine.addColorStop(0.8,'#00E5A0');
  leftLine.addColorStop(1,'transparent');
  cx.strokeStyle=leftLine; cx.lineWidth=3;
  cx.shadowColor=tc; cx.shadowBlur=15;
  cx.beginPath(); cx.moveTo(1.5,0); cx.lineTo(1.5,H); cx.stroke();
  cx.shadowBlur=0;
}

/* ── 3D PERSPECTIVE GRID ───────────────────────────────────── */
function draw3DGrid(cx, tc, W, H){
  const vp={x:W/2, y:-H*0.3};  // vanishing point
  const floor_y = H * 0.75;
  const cols=20, rows=16;

  cx.save();
  cx.globalAlpha=0.06;
  cx.strokeStyle=tc;
  cx.lineWidth=0.8;

  // Horizontal lines (perspective)
  for(let r=0;r<=rows;r++){
    const t=r/rows;
    const y = lerp(floor_y, H*1.2, t);
    const xLeft  = lerp(vp.x, -W*0.2, t);
    const xRight = lerp(vp.x, W*1.2, t);
    cx.globalAlpha = 0.03 + t*0.07;
    cx.beginPath(); cx.moveTo(xLeft,y); cx.lineTo(xRight,y); cx.stroke();
  }
  // Vertical lines (converging to VP)
  for(let c=0;c<=cols;c++){
    const xBottom = lerp(-W*0.2, W*1.2, c/cols);
    cx.globalAlpha = 0.025 + (c/cols)*0.04;
    cx.beginPath(); cx.moveTo(vp.x, vp.y); cx.lineTo(xBottom, H*1.2); cx.stroke();
  }
  cx.restore();
}

/* ── FLOATING HEXAGONS ─────────────────────────────────────── */
function drawHexField(cx, tc, tc2, seed, W, H){
  const rng = mulberry32(seed*7+13);
  const hexes=[
    {x:0.72,y:0.18,r:80,a:0.12,s:2.5},
    {x:0.88,y:0.52,r:55,a:0.09,s:1.5},
    {x:0.65,y:0.78,r:40,a:0.07,s:1},
    {x:0.93,y:0.28,r:35,a:0.08,s:1.2},
    {x:0.78,y:0.88,r:60,a:0.06,s:2},
    {x:0.60,y:0.42,r:28,a:0.05,s:0.8},
    {x:0.85,y:0.70,r:45,a:0.07,s:1.8},
    {x:0.96,y:0.85,r:32,a:0.05,s:1},
    // small scattered
    ...Array.from({length:12},()=>{
      const rv=rng();
      return {x:0.55+rv*0.44, y:rng()*0.9+0.05, r:10+rng()*20, a:0.03+rng()*0.04, s:0.5};
    }),
  ];

  hexes.forEach((h,i)=>{
    const hx=h.x*W, hy=h.y*H, hr=h.r;
    const col = i%3===0?tc : i%3===1?tc2:'#ffffff';

    // Outer glow ring
    const grd=cx.createRadialGradient(hx,hy,hr*0.5,hx,hy,hr*1.6);
    grd.addColorStop(0,rgba(col,h.a));
    grd.addColorStop(1,'transparent');
    cx.fillStyle=grd; cx.fillRect(hx-hr*2,hy-hr*2,hr*4,hr*4);

    // Hexagon outline
    cx.strokeStyle=rgba(col,h.a*1.5);
    cx.lineWidth=h.s;
    cx.shadowColor=rgba(col,0.4); cx.shadowBlur=hr*0.3;
    hexPath(cx, hx, hy, hr);
    cx.stroke();
    cx.shadowBlur=0;

    // Inner hexagon (nested)
    cx.strokeStyle=rgba(col,h.a*0.8);
    cx.lineWidth=h.s*0.5;
    hexPath(cx, hx, hy, hr*0.6);
    cx.stroke();
  });
}

function hexPath(cx,x,y,r){
  cx.beginPath();
  for(let i=0;i<6;i++){
    const a=Math.PI/180*(60*i-30);
    i===0?cx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):cx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));
  }
  cx.closePath();
}

/* ── PARTICLES ─────────────────────────────────────────────── */
function drawParticles(cx, tc, seed, W, H){
  const rng=mulberry32(seed*3+7);
  for(let i=0;i<80;i++){
    const px=rng()*W, py=rng()*H, pr=rng()*2.5+0.3;
    const col=rng()>0.6?tc:'#00E5A0';
    cx.fillStyle=rgba(col, 0.12+rng()*0.2);
    cx.beginPath();cx.arc(px,py,pr,0,Math.PI*2);cx.fill();
  }
}

/* ── CIRCUIT LINES ─────────────────────────────────────────── */
function drawCircuitLines(cx, tc, seed, W, H){
  const rng=mulberry32(seed*11+3);
  cx.strokeStyle=rgba(tc, 0.07);
  cx.lineWidth=1;
  // Right side circuit traces
  const startPoints=[[W*0.58,H*0.1],[W*0.7,H*0.25],[W*0.65,H*0.6],[W*0.55,H*0.8]];
  startPoints.forEach(([sx,sy])=>{
    cx.beginPath();cx.moveTo(sx,sy);
    let cx2=sx,cy2=sy;
    for(let i=0;i<6;i++){
      const dir=Math.floor(rng()*4);
      const len=30+rng()*80;
      const nx=cx2+(dir<2?len*(dir===0?1:-1):0);
      const ny=cy2+(dir>=2?len*(dir===2?1:-1):0);
      if(nx>W*0.55&&nx<W-20&&ny>20&&ny<H-20){
        cx.lineTo(nx,ny);
        // Node dot
        cx.fillStyle=rgba(tc,0.15);
        cx.beginPath();cx.arc(nx,ny,2,0,Math.PI*2);cx.fill();
        cx2=nx;cy2=ny;
      }
    }
    cx.stroke();
  });
}

/* ── GLASS CARD ────────────────────────────────────────────── */
function drawGlassCard(cx, tc, x, y, w, h, rgba){
  // Backdrop blur simulation (layered fills)
  cx.fillStyle='rgba(4,8,20,0.72)';
  roundRect(cx,x,y,w,h,16); cx.fill();

  // Inner glow at top
  const ig=cx.createLinearGradient(x,y,x,y+h*0.3);
  ig.addColorStop(0,rgba(tc,0.08));
  ig.addColorStop(1,'transparent');
  cx.fillStyle=ig; roundRect(cx,x,y,w,h*0.3,16); cx.fill();

  // Border
  cx.strokeStyle=rgba(tc,0.18);
  cx.lineWidth=1;
  roundRect(cx,x,y,w,h,16); cx.stroke();

  // Top shine
  const shine=cx.createLinearGradient(x,y,x+w,y);
  shine.addColorStop(0,'transparent');
  shine.addColorStop(0.3,rgba('#ffffff',0.05));
  shine.addColorStop(0.7,rgba('#ffffff',0.08));
  shine.addColorStop(1,'transparent');
  cx.fillStyle=shine; cx.fillRect(x+1,y+1,w-2,2);
}

function drawGlassPill(cx, x, y, w, h, tc, rgba){
  cx.fillStyle=rgba(tc,0.12);
  roundRect(cx,x,y,w,h,h/2); cx.fill();
  cx.strokeStyle=rgba(tc,0.3);
  cx.lineWidth=1;
  roundRect(cx,x,y,w,h,h/2); cx.stroke();
}

function roundRect(cx,x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);
  cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();
}

/* ── TYPE-SPECIFIC RIGHT PANELS ─────────────────────────────── */
function drawTypePanel(cx, post, idx, rx, ry, rpw, rph, tc, rgba, W, H){
  const type=post.type;
  if(type==='STAT')        statPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='EDU')    eduPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='POLL')   pollPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='MEME')   memePanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='TECH')   techPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='THREAD') threadPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='VISION') visionPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='LAUNCH') launchPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='RECAP')  recapPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='COMPETITOR') compPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='ALPHA')  alphaPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else if(type==='BUILD')  buildPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
  else                     defaultPanel(cx,post,rx,ry,rpw,rph,tc,rgba);
}

function statPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  // Big glowing number + mini bar chart
  const mx=rx+rpw/2, my=ry+rph*0.42;
  // Number glow
  const ng=cx.createRadialGradient(mx,my,0,mx,my,200);
  ng.addColorStop(0,rgba(tc,0.25)); ng.addColorStop(1,'transparent');
  cx.fillStyle=ng; cx.fillRect(rx,ry,rpw,rph);

  const num=(post.hook||'').split('\n')[0].substring(0,12);
  cx.font='bold 108px "Syne",sans-serif';
  cx.fillStyle=tc;
  cx.shadowColor=rgba(tc,0.8); cx.shadowBlur=40;
  cx.textAlign='center';
  cx.fillText(num, mx, my+14);
  cx.shadowBlur=0;

  // Sub label
  const sub=(post.body||'').split('\n')[0]||'';
  cx.font='500 16px "Space Grotesk",sans-serif';
  cx.fillStyle=rgba('#ffffff',0.45);
  cx.fillText(sub.substring(0,38), mx, ry+rph*0.58);
  cx.textAlign='left';

  // Animated-look bars
  const bars=[0.9,0.65,0.5,0.35,0.25];
  const bw=(rpw-48)/bars.length-6;
  bars.forEach((p,i)=>{
    const bx=rx+24+i*(bw+6), by=ry+rph-80, bh=rph*0.25*p;
    // Track
    cx.fillStyle=rgba('#ffffff',0.05); cx.fillRect(bx,by-bh,bw,bh);
    // Fill with gradient
    const bg2=cx.createLinearGradient(0,by-bh,0,by);
    bg2.addColorStop(0,rgba(tc,0.8)); bg2.addColorStop(1,rgba(tc,0.2));
    cx.fillStyle=bg2; cx.fillRect(bx,by-bh,bw,bh);
    // Top cap glow
    cx.fillStyle=tc;
    cx.shadowColor=rgba(tc,0.9); cx.shadowBlur=8;
    cx.fillRect(bx,by-bh,bw,3);
    cx.shadowBlur=0;
  });
}

function eduPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  const lines=(post.body||'').split('\n').filter(Boolean).slice(0,5);
  let sy=ry+70;
  lines.forEach((line,i)=>{
    if(sy>ry+rph-60) return;
    const y2=sy, active=i===0;

    // Card background
    cx.fillStyle=active?rgba(tc,0.12):rgba('#ffffff',0.03);
    roundRect(cx,rx+16,y2-2,rpw-32,44,8); cx.fill();
    if(active){
      cx.strokeStyle=rgba(tc,0.35); cx.lineWidth=1;
      roundRect(cx,rx+16,y2-2,rpw-32,44,8); cx.stroke();
    }

    // Left accent
    cx.fillStyle=active?tc:rgba(tc,0.3);
    cx.shadowColor=active?rgba(tc,0.8):'transparent'; cx.shadowBlur=active?8:0;
    cx.fillRect(rx+16,y2-2,3,44);
    cx.shadowBlur=0;

    // Text
    cx.font=(active?'bold ':'')+'13px "Space Grotesk",sans-serif';
    cx.fillStyle=rgba('#ffffff',active?0.9:0.5);
    cx.fillText(line.replace(/^[\d\→\·\•\*]+\s*/,'').substring(0,48), rx+30, y2+22);

    sy+=56;
  });
}

function pollPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  const opts=(post.cta||'').split('\n').filter(l=>/^[ABCDE]\)/.test(l.trim())).slice(0,4);
  if(opts.length<2){defaultPanel(cx,post,rx,ry,rpw,rph,tc,rgba);return;}

  const totalH=opts.length*72+((opts.length-1)*10);
  let oy=ry+(rph-totalH)/2;
  const pcts=[0.78,0.54,0.62,0.38];

  opts.forEach((opt,i)=>{
    const by=oy+i*82, bh=58, bw=rpw-32;
    const pct=pcts[i]||0.3, fillW=bw*pct;

    // Track bg
    cx.fillStyle=rgba('#ffffff',0.04);
    roundRect(cx,rx+16,by,bw,bh,10); cx.fill();

    // Fill bar with gradient
    const fg=cx.createLinearGradient(rx+16,0,rx+16+fillW,0);
    fg.addColorStop(0,rgba(i===0?tc:'#00E5A0',i===0?0.35:0.2));
    fg.addColorStop(1,rgba(i===0?tc:'#00E5A0',0.05));
    cx.fillStyle=fg;
    cx.save(); cx.beginPath();
    roundRect(cx,rx+16,by,bw,bh,10); cx.clip();
    cx.fillRect(rx+16,by,fillW,bh); cx.restore();

    // Border
    cx.strokeStyle=rgba(i===0?tc:'#00E5A0',i===0?0.4:0.15);
    cx.lineWidth=i===0?1.5:0.8;
    roundRect(cx,rx+16,by,bw,bh,10); cx.stroke();

    // Text
    cx.font=(i===0?'bold ':'')+'14px "Space Grotesk",sans-serif';
    cx.fillStyle=rgba('#ffffff',i===0?0.9:0.6);
    cx.fillText(opt.trim().substring(0,46), rx+24, by+bh/2+5);

    // Pct
    cx.font='bold 14px "Syne",sans-serif';
    cx.fillStyle=rgba(i===0?tc:'#00E5A0',0.8);
    cx.textAlign='right';
    cx.fillText(Math.round(pct*100)+'%', rx+16+bw-10, by+bh/2+5);
    cx.textAlign='left';

    // Leader icon
    if(i===0){
      cx.fillStyle=tc; cx.shadowColor=rgba(tc,0.8); cx.shadowBlur=8;
      cx.font='14px serif'; cx.fillText('👑',rx+16+bw-44, by+bh/2+6);
      cx.shadowBlur=0;
    }
  });
}

function memePanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  // Split visual: BEFORE (red/bad) vs AFTER (green/good)
  const mid=ry+rph/2;

  // Before section
  cx.fillStyle=rgba('#FF1744',0.08);
  cx.fillRect(rx+16,ry+30,rpw-32,rph*0.42-20);

  // After section  
  cx.fillStyle=rgba('#00E5A0',0.08);
  cx.fillRect(rx+16,mid+10,rpw-32,rph*0.42);

  // Labels
  cx.font='bold 11px "Space Grotesk",sans-serif';
  cx.fillStyle=rgba('#FF1744',0.7);
  cx.textAlign='center';
  cx.fillText('WITHOUT GRIDMIND', rx+rpw/2, ry+55);
  cx.fillStyle=rgba('#00E5A0',0.7);
  cx.fillText('WITH GRIDMIND', rx+rpw/2, mid+32);
  cx.textAlign='left';

  // Divider
  const div=cx.createLinearGradient(rx+16,0,rx+rpw-16,0);
  div.addColorStop(0,'transparent'); div.addColorStop(0.3,'rgba(255,255,255,0.15)');
  div.addColorStop(0.7,'rgba(255,255,255,0.15)'); div.addColorStop(1,'transparent');
  cx.strokeStyle=div; cx.lineWidth=1;
  cx.beginPath();cx.moveTo(rx+16,mid);cx.lineTo(rx+rpw-16,mid);cx.stroke();

  // VS badge
  cx.fillStyle='rgba(4,8,20,0.9)';
  cx.beginPath();cx.arc(rx+rpw/2,mid,18,0,Math.PI*2);cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.2)'; cx.lineWidth=1;
  cx.beginPath();cx.arc(rx+rpw/2,mid,18,0,Math.PI*2);cx.stroke();
  cx.font='bold 12px "Syne",sans-serif'; cx.fillStyle='#fff'; cx.textAlign='center';
  cx.fillText('VS',rx+rpw/2,mid+5); cx.textAlign='left';

  // Content lines
  const lines=(post.body||'').split('\n').filter(Boolean);
  let ly=ry+80; let inAfter=false;
  lines.slice(0,8).forEach(l=>{
    if(ly>H-100) return;
    if(l.includes('GridMind'))inAfter=true;
    cx.font='13px "Space Grotesk",sans-serif';
    cx.fillStyle=rgba(inAfter?'#00E5A0':'#FF6B6B',0.75);
    cx.fillText(l.substring(0,42),rx+24,ly);
    ly+=ly<mid-20?34:34;
    if(!inAfter&&ly>mid-30)ly=mid+50;
  });
}

function techPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  // Node graph / tech architecture
  const nodes=[
    {x:0.5,y:0.18,l:'AI Layer',c:tc,r:36},
    {x:0.22,y:0.45,l:'Blockchain',c:'#00E5A0',r:28},
    {x:0.78,y:0.45,l:'IoT SDK',c:'#FFB300',r:28},
    {x:0.5,y:0.72,l:'App Layer',c:'#B026FF',r:28},
    {x:0.15,y:0.22,l:'ETH L2',c:'#627EEA',r:18},
    {x:0.85,y:0.22,l:'Solana',c:'#9945FF',r:18},
    {x:0.5,y:0.55,l:'ZK',c:tc,r:14},
  ];

  // Draw connections first
  const edges=[[0,1],[0,2],[1,3],[2,3],[0,4],[0,5],[1,6],[2,6]];
  edges.forEach(([a,b])=>{
    const na=nodes[a],nb=nodes[b];
    const ax=rx+na.x*rpw, ay=ry+na.y*rph;
    const bx=rx+nb.x*rpw, by2=ry+nb.y*rph;
    const grad=cx.createLinearGradient(ax,ay,bx,by2);
    grad.addColorStop(0,rgba(na.c,0.5)); grad.addColorStop(1,rgba(nb.c,0.5));
    cx.strokeStyle=grad; cx.lineWidth=1.5;
    cx.setLineDash([4,6]);
    cx.beginPath(); cx.moveTo(ax,ay); cx.lineTo(bx,by2); cx.stroke();
    cx.setLineDash([]);
    // Arrow mid
    const mx2=(ax+bx)/2, my2=(ay+by2)/2;
    cx.fillStyle=rgba(tc,0.4);
    cx.beginPath();cx.arc(mx2,my2,2.5,0,Math.PI*2);cx.fill();
  });

  // Draw nodes
  nodes.forEach(n=>{
    const nx=rx+n.x*rpw, ny=ry+n.y*rph;
    // Glow
    const ng=cx.createRadialGradient(nx,ny,0,nx,ny,n.r*2.5);
    ng.addColorStop(0,rgba(n.c,0.25)); ng.addColorStop(1,'transparent');
    cx.fillStyle=ng; cx.fillRect(nx-n.r*3,ny-n.r*3,n.r*6,n.r*6);
    // Circle
    cx.fillStyle=rgba(n.c,0.2);
    cx.strokeStyle=rgba(n.c,0.7);
    cx.lineWidth=2;
    cx.shadowColor=rgba(n.c,0.6); cx.shadowBlur=n.r*0.5;
    cx.beginPath();cx.arc(nx,ny,n.r,0,Math.PI*2);cx.fill();cx.stroke();
    cx.shadowBlur=0;
    // Label
    cx.font='bold '+Math.max(9,n.r*0.38)+'px "Space Grotesk",sans-serif';
    cx.fillStyle='#fff'; cx.textAlign='center';
    cx.fillText(n.l,nx,ny+n.r*0.15+4);
    cx.textAlign='left';
  });
}

function threadPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  const lines=(post.body||'').split('\n').filter(Boolean).slice(0,7);
  let ty=ry+50;
  lines.forEach((line,i)=>{
    if(ty>ry+rph-40) return;
    const active=i===0;
    // Connector line
    if(i<lines.length-1){
      cx.strokeStyle=rgba(tc,0.2); cx.lineWidth=1.5;
      cx.setLineDash([3,5]);
      cx.beginPath();cx.moveTo(rx+34,ty+14);cx.lineTo(rx+34,ty+50);cx.stroke();
      cx.setLineDash([]);
    }
    // Node
    if(active){
      cx.fillStyle=tc;
      cx.shadowColor=rgba(tc,0.8); cx.shadowBlur=12;
      cx.beginPath();cx.arc(rx+34,ty+8,10,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;
      cx.fillStyle='#000'; cx.font='bold 9px "Space Grotesk",sans-serif';
      cx.textAlign='center'; cx.fillText(''+(i+1),rx+34,ty+12); cx.textAlign='left';
    } else {
      cx.fillStyle=rgba(tc,0.3);
      cx.strokeStyle=rgba(tc,0.5); cx.lineWidth=1.5;
      cx.beginPath();cx.arc(rx+34,ty+8,7,0,Math.PI*2);cx.fill();cx.stroke();
    }
    // Text
    cx.font=(active?'bold ':'')+(active?'14':'12')+'px "Space Grotesk",sans-serif';
    cx.fillStyle=rgba('#ffffff',active?0.88:0.45);
    cx.fillText(line.replace(/^[\d\/\→\·\•]+\s*/,'').substring(0,50), rx+52, ty+13);
    ty+=active?56:44;
  });
}

function visionPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  const cx2=rx+rpw/2, cy2=ry+rph/2;
  // Orbital rings
  [160,115,78,48].forEach((r,i)=>{
    cx.strokeStyle=rgba(i===0?'#00E5A0':tc, 0.06+i*0.025);
    cx.lineWidth=1+i*0.5;
    if(i<2)cx.setLineDash([4+i*2,8+i*2]);
    cx.beginPath();cx.arc(cx2,cy2,r,0,Math.PI*2);cx.stroke();
    cx.setLineDash([]);
  });
  // Central orb
  const cg=cx.createRadialGradient(cx2,cy2,0,cx2,cy2,72);
  cg.addColorStop(0,rgba(tc,0.6)); cg.addColorStop(0.4,rgba(tc,0.25));
  cg.addColorStop(1,rgba(tc,0.0));
  cx.fillStyle=cg; cx.beginPath();cx.arc(cx2,cy2,72,0,Math.PI*2);cx.fill();

  cx.fillStyle=rgba(tc,0.2);
  cx.strokeStyle=rgba(tc,0.6); cx.lineWidth=2;
  cx.shadowColor=rgba(tc,0.7); cx.shadowBlur=20;
  cx.beginPath();cx.arc(cx2,cy2,40,0,Math.PI*2);cx.fill();cx.stroke();
  cx.shadowBlur=0;

  cx.font='32px serif'; cx.textAlign='center';
  cx.fillText('🌍',cx2,cy2+12);

  // Orbiting dots
  [0,60,120,180,240,300].forEach((angle,i)=>{
    const a=Math.PI*angle/180;
    const r=[115,78,160][i%3];
    const dx=cx2+r*Math.cos(a), dy=cy2+r*Math.sin(a);
    cx.fillStyle=rgba(i%2===0?tc:'#00E5A0',0.6);
    cx.shadowColor=rgba(i%2===0?tc:'#00E5A0',0.8); cx.shadowBlur=6;
    cx.beginPath();cx.arc(dx,dy,4+i%3*2,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
  });

  cx.font='italic 13px "Space Grotesk",sans-serif';
  cx.fillStyle=rgba(tc,0.6); cx.textAlign='center';
  cx.fillText((post.hook||'').substring(0,44), cx2, ry+rph-38);
  cx.textAlign='left';
}

function launchPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  const cx2=rx+rpw/2, cy2=ry+rph/2;

  const exh=cx.createRadialGradient(cx2,cy2+100,0,cx2,cy2+100,180);
  exh.addColorStop(0,rgba('#FF6B35',0.4)); exh.addColorStop(0.5,rgba(tc,0.15)); exh.addColorStop(1,'transparent');

    cx.shadowColor=rgba(tc,0.7); cx.shadowBlur=12;

    cx.fillText(item.replace(/^[✅🔄⬜📄⚡📊🗺️]\s*/,'').substring(0,46),rx+46,sy+itemH*0.62);

function alphaPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  const cx2=rx+rpw/2, cy2=ry+rph*0.4;
  // Multi-ring glow
  [140,100,68,42].forEach((r,i)=>{

    g.addColorStop(0,'transparent'); g.addColorStop(0.7,rgba(tc,0.04+i*0.02)); g.addColorStop(1,'transparent');
    cx.fillStyle=g; cx.beginPath();cx.arc(cx2,cy2,r,0,Math.PI*2);cx.fill();
  });
  // Central orb
  cx.fillStyle=rgba(tc,0.2); cx.strokeStyle=rgba(tc,0.6); cx.lineWidth=2;

  cx.beginPath();cx.arc(cx2,cy2,44,0,Math.PI*2);cx.fill();cx.stroke();

  cx.font='34px serif'; cx.textAlign='center'; cx.fillText('🔵',cx2,cy2+12);
  cx.font='bold 15px "Syne",sans-serif'; cx.fillStyle=tc;
  cx.fillText('ALPHA DROP',cx2,ry+rph*0.68);
  cx.font='11px "Space Grotesk",sans-serif'; cx.fillStyle=rgba('#fff',0.35);
  cx.fillText('$GRID Intelligence',cx2,ry+rph*0.78);
  cx.textAlign='left';
  // Key points list
  const lines=(post.body||'').split('\n').filter(l=>l.includes('→')).slice(0,3);
  lines.forEach((l,i)=>{
    cx.font='11px "Space Grotesk",sans-serif';
    cx.fillStyle=rgba(tc,0.65);
    cx.fillText(l.substring(0,44),rx+20,ry+rph*0.85+i*22);

function buildPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  const lines=(post.body||'').split('\n').filter(Boolean).slice(0,6);
  let sy=ry+50;
  lines.forEach((l,i)=>{
    if(sy>ry+rph-60) return;
    const done=l.includes('✅');
    const wip=l.includes('🔄');
    const col=done?'#00E5A0':wip?tc:'rgba(255,255,255,0.2)';
    // Track
    cx.fillStyle=rgba('#ffffff',0.04); cx.fillRect(rx+16,sy,rpw-32,46);
    // Fill
    if(done||wip){
      cx.fillStyle=rgba(col,done?0.12:0.06);
      cx.fillRect(rx+16,sy,(rpw-32)*(done?1:0.6),46);
    }
    cx.strokeStyle=rgba(col,done?0.4:0.15); cx.lineWidth=1;
    cx.strokeRect(rx+16,sy,rpw-32,46);
    // Status dot
    cx.fillStyle=col; cx.shadowColor=rgba(col,0.8); cx.shadowBlur=done?10:4;
    cx.beginPath();cx.arc(rx+32,sy+23,5,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
    // Text
    cx.font=(done?'bold ':'')+'12px "Space Grotesk",sans-serif';
    cx.fillStyle=rgba('#fff',done?0.85:wip?0.6:0.3);
    cx.fillText(l.replace(/^[✅🔄⬜→\s]+/,'').substring(0,46),rx+48,sy+27);
    sy+=56;
  });
}

function defaultPanel(cx,post,rx,ry,rpw,rph,tc,rgba){
  const cx2=rx+rpw/2, cy2=ry+rph/2;

  cx.shadowColor=rgba(tc,0.5); cx.shadowBlur=30;

  cx.fillText((post.type||'').toUpperCase(),cx2,cy2+78); cx.textAlign='left';
}

/* ── TEXT WRAP ─────────────────────────────────────────────── */
function wrapTextStyled(cx, text, x, y, maxW, lineH, color, font, maxLines=3){
  cx.font=font; cx.fillStyle=color;
  const words=text.split(' ');
  let line='', cy=y, lines=0;
  for(let w of words){
    const test=line?line+' '+w:w;
    if(cx.measureText(test).width>maxW&&line){
      cx.fillText(line,x,cy);
      line=w; cy+=lineH; lines++;
      if(lines>=maxLines)break;
    } else line=test;
  }
  if(line&&lines<maxLines) cx.fillText(line,x,cy);
}

// Like wrapTextStyled but RETURNS the y-coordinate after the last line
// so subsequent elements can flow below it
function wrapReturnY(cx, text, x, y, maxW, lineH, color, font, maxLines=3){
  cx.font=font; cx.fillStyle=color;
  const words=text.split(' ');
  let line='', cy=y, lines=0;
  for(let w of words){
    const test=line?line+' '+w:w;
    if(cx.measureText(test).width>maxW&&line){
      cx.fillText(line,x,cy);
      line=w; cy+=lineH; lines++;
      if(lines>=maxLines){ line=''; break; }
    } else line=test;
  }
  if(line) { cx.fillText(line,x,cy); cy+=lineH; }
  return cy;  // return bottom y of last rendered line
}

/* ── RNG ────────────────────────────────────────────────────── */
function mulberry32(a){
  return function(){
    a|=0;a=a+0x6D2B79F5|0;
    let t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

/* ════════════════════════════════════════════════════════════════
   UI
════════════════════════════════════════════════════════════════ */
function buildSidebar(){
  const sb=document.getElementById('sb');
  [[1,7,'Wk 1 · Launch'],[8,14,'Wk 2 · Education'],[15,21,'Wk 3 · Token'],[22,30,'Wk 4 · Vision']]
  .forEach(([s,e,l])=>{
    sb.innerHTML+=`<div class="wk-lbl">${l}</div>`;
    for(let d=s;d<=e;d++){
      const cnt=POSTS.filter(p=>p.day===d).length;
      sb.innerHTML+=`<button class="db${d===curDay?' on':''}" id="db${d}" onclick="goDay(${d})">
        <span class="dn">D${d}</span><span class="dt">${DN[d]||''}</span><span class="dc">${cnt}</span>
      </button>`;
    }
  });
}

function goDay(d){
  curDay=d;
  document.querySelectorAll('.db').forEach(b=>b.classList.remove('on'));
  const b=document.getElementById('db'+d);
  if(b){b.classList.add('on');b.scrollIntoView({block:'nearest',behavior:'smooth'});}
  render();
}

function ft(type,el){
  curFilter=type;
  document.querySelectorAll('.fb-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function render(){
  let posts=POSTS.filter(p=>p.day===curDay);
  if(curFilter!=='ALL'){
    const typed=POSTS.filter(p=>p.type===curFilter);
    posts=typed.filter(p=>p.day===curDay).length?typed.filter(p=>p.day===curDay):typed;
  }
  document.getElementById('fbDay').textContent=`Day ${curDay} · ${DN[curDay]||''} · ${posts.length} posts`;

  const list=document.getElementById('pl');
  list.innerHTML='';

  posts.forEach(p=>{
    const idx=POSTS.indexOf(p);
    const meta=TM[p.type]||{label:p.type,bg:TC[p.type]||'#888',fg:'#fff'};
    const tc2=TC[p.type]||'#1A73E8';
    const card=document.createElement('div');
    card.className='pc'; card.dataset.idx=idx;
    card.style.setProperty('--tc',tc2);
    card.innerHTML=`
      <div class="pc-stripe" style="background:${tc2};box-shadow:0 0 8px ${tc2}80;"></div>
      <div class="pc-body">
        <div class="pct">
          <span class="tb" style="background:${meta.bg};color:${meta.fg}">${meta.label}</span>
          <span class="ptm">${p.time}</span>
          <span class="pn">#${idx+1}/200</span>
        </div>
        <div class="ph">${escH(p.hook)}</div>
        <div class="pb">${escH(p.body||'')}</div>
        <div class="pfoot">
          ${p.visual&&p.visual!=='NONE'?`<span class="vtag">📸 ${p.visual}</span>`:''}
          ${p.note?`<span class="ntag">· ${escH(p.note)}</span>`:''}
          <button class="cbtn" onclick="copyP(event,${idx})">📋 Copy</button>
          <button class="dlbtn" onclick="dlP(event,${idx})">⬇ PNG</button>
        </div>
      </div>
      <div class="pc-thumb">
        <div class="pc-thumb-loader">rendering…</div>
        <canvas id="cv${idx}"></canvas>
      </div>`;
    list.appendChild(card);
    // Stagger rendering
    setTimeout(()=>{
      const cv=document.getElementById('cv'+idx);
      if(cv){
        drawPoster(cv,p,idx);
        const loader=card.querySelector('.pc-thumb-loader');
        if(loader) loader.style.display='none';
      }
    },idx%8*50+30);
  });
}

function copyP(e,idx){
  e.stopPropagation();
  const p=POSTS[idx];
  const txt=[p.hook,p.body,p.cta].filter(Boolean).join('\n\n');
  navigator.clipboard.writeText(txt).catch(()=>{
    const t=document.createElement('textarea');
    t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
  });
  const b=e.target; b.textContent='✓ Copied!'; b.classList.add('ok');
  setTimeout(()=>{b.textContent='📋 Copy';b.classList.remove('ok');},2000);
}

function dlP(e,idx){
  e.stopPropagation();
  const p=POSTS[idx];
  const cv=document.getElementById('cv'+idx);
  if(!cv) return;
  drawPoster(cv,p,idx);
  setTimeout(()=>{
    const a=document.createElement('a');
    a.download=`GridMind_D${String(p.day).padStart(2,'0')}_${idx+1}_${p.type}.png`;
    a.href=cv.toDataURL('image/png',1.0);
    a.click();
  },80);
}

function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

buildSidebar();
render();
</script>
